<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A powerful, elegant ToDo List app to organize, prioritize, and track your daily tasks efficiently." />
  <title>TaskFlow — Smart ToDo Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ════════════════════════════ SIDEBAR ════════════════════════════ -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">✓</div>
    <span>TaskFlow</span>
  </div>

  <nav class="sidebar-nav">
    <button class="nav-item active" id="nav-active" onclick="switchView('active')">
      <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <span>All Tasks</span>
      <span class="nav-badge" id="badge-active">0</span>
    </button>
    <button class="nav-item" id="nav-archived" onclick="switchView('archived')">
      <svg viewBox="0 0 24 24"><path d="M21 8v13H3V8"/><rect x="1" y="3" width="22" height="5"/><path d="M10 12h4"/></svg>
      <span>Archived</span>
      <span class="nav-badge" id="badge-archived">0</span>
    </button>
  </nav>

  <!-- Stats Panel -->
  <div class="stats-panel">
    <h3 class="stats-title">Overview</h3>
    <div class="stat-row">
      <span class="stat-label">Total</span>
      <span class="stat-val" id="stat-total">0</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Completed</span>
      <span class="stat-val completed" id="stat-completed">0</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Pending</span>
      <span class="stat-val pending" id="stat-pending">0</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Overdue</span>
      <span class="stat-val overdue" id="stat-overdue">0</span>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-bar"></div>
      </div>
      <span class="progress-label" id="progress-label">0% Done</span>
    </div>

    <div class="priority-pills">
      <span class="pill high"><span id="stat-high">0</span> High</span>
      <span class="pill medium"><span id="stat-medium">0</span> Med</span>
      <span class="pill low"><span id="stat-low">0</span> Low</span>
    </div>
  </div>
</aside>

<!-- ════════════════════════════ MAIN ════════════════════════════ -->
<main class="main-content">

  <!-- Top bar -->
  <header class="topbar">
    <button class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle sidebar">
      <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="topbar-center">
      <h1 class="page-title" id="page-title">All Tasks</h1>
    </div>
    <div class="topbar-actions">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search-input" placeholder="Search tasks…" oninput="filterTasks()" />
      </div>
      <select id="filter-priority" onchange="filterTasks()" title="Filter by priority">
        <option value="">All Priorities</option>
        <option value="high">🔴 High</option>
        <option value="medium">🟡 Medium</option>
        <option value="low">🟢 Low</option>
      </select>
      <select id="filter-status" onchange="filterTasks()" title="Filter by status">
        <option value="">All Status</option>
        <option value="pending">Pending</option>
        <option value="completed">Completed</option>
      </select>
      <button class="btn-add" id="btn-add-task" onclick="openModal()">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Task
      </button>
    </div>
  </header>

  <!-- Task grid -->
  <section class="task-section">
    <div class="task-grid" id="task-grid"></div>
    <div class="empty-state" id="empty-state" style="display:none">
      <div class="empty-icon">📋</div>
      <h2>No tasks yet</h2>
      <p>Click <strong>Add Task</strong> to get started!</p>
    </div>
  </section>
</main>

<!-- ════════════════════════════ MODAL: Add / Edit Task ════════════════════════════ -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <button class="modal-close" onclick="closeModal()" aria-label="Close">&times;</button>
    <h2 class="modal-title" id="modal-title">New Task</h2>

    <form id="task-form" onsubmit="submitTask(event)">
      <input type="hidden" id="task-id" />

      <div class="form-group">
        <label for="task-title">Title <span class="required">*</span></label>
        <input type="text" id="task-title" placeholder="What needs to be done?" maxlength="120" required />
      </div>

      <div class="form-group">
        <label for="task-desc">Description</label>
        <textarea id="task-desc" placeholder="Add details about this task…" rows="3" maxlength="500"></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="task-priority">Priority</label>
          <select id="task-priority">
            <option value="high">🔴 High</option>
            <option value="medium" selected>🟡 Medium</option>
            <option value="low">🟢 Low</option>
          </select>
        </div>
        <div class="form-group">
          <label for="task-category">Category</label>
          <input type="text" id="task-category" placeholder="e.g. Work, Personal" maxlength="40" />
        </div>
      </div>

      <div class="form-group">
        <label for="task-due">Due Date</label>
        <input type="date" id="task-due" />
      </div>

      <div class="modal-footer">
        <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn-primary" id="form-submit-btn">Create Task</button>
      </div>
    </form>
  </div>
</div>

<!-- ════════════════════════════ TOAST ════════════════════════════ -->
<div class="toast-container" id="toast-container"></div>

<script src="app.js"></script>
</body>
</html>
